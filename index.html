<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MCZA Space</title>
</head>
<body>
    <div class="background">
        <video autoplay muted loop class="desktop-video" id="background_video">
            <source src="assets/background.mp4" type="video/mp4">
        </video>

        <video autoplay muted loop class="mobile-video" playsinline id="background_video">
            <source src="assets/background-mobile.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content">
        <header>
            <div class="logo">
                <img src="assets/Логотип.png" alt="Логотип">
            </div>
            <div class="menu">
                <div class="menu-panel">

                </div>
                <div class="metadata-panel">
                    
                </div>
            </div>

        </header>
    </div>

    
    
</body>
</html>
